# --- Application -------------------------------------------------
spring.application.name=log-intelligence-backend
server.port=8080

# --- Kafka -------------------------------------------------------
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
spring.kafka.consumer.group-id=log-consumer-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.listener.concurrency=1
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.listener.ack-mode=record
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# --- MongoDB -----------------------------------------------------
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://127.0.0.1:27017/log-intelligence}

# --- Elasticsearch -----------------------------------------------
elasticsearch.host=${ELASTICSEARCH_HOST:127.0.0.1}
elasticsearch.port=${ELASTICSEARCH_PORT:9200}

# --- JWT Authentication ------------------------------------------
# IMPORTANT: Override JWT_SECRET in production via environment variable
jwt.secret=${JWT_SECRET:log-intelligence-jwt-secret-key-that-is-at-least-256-bits-long-for-hmac}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# --- Logging -----------------------------------------------------
logging.level.com.logintel=INFO
logging.level.org.springframework.kafka=WARN
logging.level.org.elasticsearch=WARN

# --- Jackson (JSON) ----------------------------------------------
spring.jackson.serialization.write-dates-as-timestamps=false
