version: '3.8'

# ─── Port-binding convention ───────────────────────────────────────
# Public  : "80:80"            → exposed on every interface (the frontend)
# Internal: "127.0.0.1:PORT:..." → only reachable from this host.
#                                  Other containers reach each other through
#                                  the log-network using service names, so we
#                                  don't need to expose ports to do that.
# This keeps Elasticsearch/Kafka/Mongo from being open on the public internet
# when this compose runs on a cloud VM.

services:

  # ─── Zookeeper ────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "127.0.0.1:2181:2181"
    networks:
      - log-network

  # ─── Kafka Broker ─────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Use 127.0.0.1 for the host listener (not "localhost") so Windows
      # clients resolve to IPv4 directly. With "localhost" they hit IPv6 ::1
      # first and time out because Docker only binds to 127.0.0.1.
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://127.0.0.1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - log-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ─── Elasticsearch ────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - log-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Kibana ───────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana
    restart: unless-stopped
    depends_on:
      - elasticsearch
    ports:
      - "127.0.0.1:5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    networks:
      - log-network

  # ─── MongoDB ──────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:?MONGO_USER must be set in .env}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:?MONGO_PASS must be set in .env}
    volumes:
      - mongo-data:/data/db
    networks:
      - log-network
    healthcheck:
      test: ["CMD", "mongosh", "-u", "${MONGO_USER}", "-p", "${MONGO_PASS}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Boot Backend ──────────────────────────────────────
  backend:
    build: ./backend
    container_name: log-backend
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_USER}:${MONGO_PASS}@mongodb:27017/log-intelligence?authSource=admin
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
    networks:
      - log-network

  # ─── Python AI Service ────────────────────────────────────────
  ai-service:
    build: ./ai-service
    container_name: log-ai-service
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      SPRING_BACKEND_URL: http://backend:8080
      FLASK_PORT: 5000
      GROQ_API_KEY: ${GROQ_API_KEY:?GROQ_API_KEY must be set in .env}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    networks:
      - log-network

  # ─── React Frontend (public) ──────────────────────────────────
  frontend:
    build: ./frontend
    container_name: log-frontend
    restart: unless-stopped
    depends_on:
      - backend
      - ai-service
    ports:
      - "80:80"
    volumes:
      - ./logs/nginx-frontend:/var/log/nginx-volume
    networks:
      - log-network

  # ─── Log Collectors ───────────────────────────────────────────
  # Producer side of the pipeline. Tails real log sources and pushes
  # LogEntry JSON to the Kafka `app-logs` topic. Without this service
  # running, Kafka stays empty and Elasticsearch never gets populated.
  log-collectors:
    build: ./log-collectors
    container_name: log-collectors
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      # Stream logs from other Docker containers (kafka, es, kibana, ...)
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Tail nginx access log written by the frontend container
      - ./logs/nginx-frontend:/var/log/nginx-volume:ro
      # Tail app log files dropped here by the user
      - ./logs/app:/var/log/app:ro
      # Tail Docker Desktop's own logs — real OS process, updates constantly
      - C:/Users/devad/AppData/Local/Docker/log/host:/var/log/docker-host:ro
      # Tail MariaDB log files — real database activity
      - "C:/Program Files/MariaDB 11.6/data:/var/log/mariadb:ro"
    networks:
      - log-network

volumes:
  es-data:
    driver: local
  mongo-data:
    driver: local

networks:
  log-network:
    driver: bridge
